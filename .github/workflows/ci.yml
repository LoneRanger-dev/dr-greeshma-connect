name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── API: typecheck + Vitest ─────────────────────────────────────────────
  api:
    name: API — typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: TypeScript check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  # ── Web: lint + typecheck + Vitest unit tests ────────────────────────────
  web:
    name: Web — lint + typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
        env:
          # Dummy values so Next.js modules that read env at import don't throw
          NEXTAUTH_SECRET: ci-secret-not-real
          NEXTAUTH_URL: http://localhost:3000

  # ── E2E: Playwright (Chromium only, runs on push to main) ───────────────
  e2e:
    name: E2E — Playwright (Chromium)
    runs-on: ubuntu-latest
    needs: [web]
    # Only run on pushes to the default branch (not on every PR to save minutes)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run e2e tests
        run: pnpm test:e2e --project=chromium
        env:
          CI: true
          NEXTAUTH_SECRET: ci-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
